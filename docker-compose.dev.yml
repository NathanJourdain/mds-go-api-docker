services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "${PORT:-3000}:3000"
    env_file: .env
    environment:
      DATABASE_URL: /data/app.db
      API_KEY: ${API_KEY}
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock
      - db_data:/data

volumes:
  db_data:
