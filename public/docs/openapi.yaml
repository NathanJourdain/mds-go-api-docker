openapi: 3.1.0
info:
  title: Docker Manager API
  version: 1.0.0
  description: API Go Fiber pour décrire et déployer des infrastructures multi-conteneurs via Docker SDK.

servers:
  - url: https://api.mds-go-api-docker.orb.local/api/v1

tags:
  - name: servers
  - name: projects
  - name: services
  - name: volumes
  - name: deployments
  - name: docker

paths:
  /projects:
    get:
      tags: [projects]
      summary: Lister tous les projets
      responses:
        "200":
          description: Liste de projets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      tags: [projects]
      summary: Créer un projet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "201":
          description: Projet créé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{id}:
    parameters:
      - $ref: "#/components/parameters/ID"
    get:
      tags: [projects]
      summary: Obtenir un projet par ID
      responses:
        "200":
          description: Projet trouvé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [projects]
      summary: Mettre à jour un projet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectRequest"
      responses:
        "200":
          description: Projet mis à jour
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [projects]
      summary: Supprimer un projet
      responses:
        "204":
          description: Projet supprimé
        "404":
          $ref: "#/components/responses/NotFound"

  /projects/{id}/services:
    parameters:
      - $ref: "#/components/parameters/ID"
    post:
      tags: [services]
      summary: Ajouter un service à un projet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateServiceRequest"
      responses:
        "201":
          description: Service créé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"

  /projects/{id}/services/{sid}:
    parameters:
      - $ref: "#/components/parameters/ID"
      - name: sid
        in: path
        required: true
        schema:
          type: string
          format: uuid
    put:
      tags: [services]
      summary: Mettre à jour un service
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateServiceRequest"
      responses:
        "200":
          description: Service mis à jour
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [services]
      summary: Supprimer un service
      responses:
        "204":
          description: Service supprimé
        "404":
          $ref: "#/components/responses/NotFound"

  /projects/{id}/volumes:
    parameters:
      - $ref: "#/components/parameters/ID"
    post:
      tags: [volumes]
      summary: Ajouter un volume à un projet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVolumeRequest"
      responses:
        "201":
          description: Volume créé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Volume"

  /projects/{id}/volumes/{vid}:
    parameters:
      - $ref: "#/components/parameters/ID"
      - name: vid
        in: path
        required: true
        schema:
          type: string
          format: uuid
    delete:
      tags: [volumes]
      summary: Supprimer un volume
      responses:
        "204":
          description: Volume supprimé
        "404":
          $ref: "#/components/responses/NotFound"

  /projects/{id}/deployments:
    parameters:
      - $ref: "#/components/parameters/ID"
    get:
      tags: [deployments]
      summary: Lister les déploiements d'un projet
      responses:
        "200":
          description: Liste de déploiements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Deployment"
    post:
      tags: [deployments]
      summary: Créer un déploiement pour un projet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDeploymentRequest"
      responses:
        "201":
          description: Déploiement créé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deployment"

  /deployments/{id}:
    parameters:
      - $ref: "#/components/parameters/ID"
    get:
      tags: [deployments]
      summary: Obtenir un déploiement par ID
      responses:
        "200":
          description: Déploiement trouvé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deployment"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [deployments]
      summary: Supprimer un déploiement
      responses:
        "204":
          description: Déploiement supprimé
        "404":
          $ref: "#/components/responses/NotFound"

  /deployments/{id}/start:
    parameters:
      - $ref: "#/components/parameters/ID"
    post:
      tags: [deployments]
      summary: Démarrer un déploiement
      responses:
        "200":
          description: Déploiement démarré

  /deployments/{id}/stop:
    parameters:
      - $ref: "#/components/parameters/ID"
    post:
      tags: [deployments]
      summary: Arrêter un déploiement
      responses:
        "200":
          description: Déploiement arrêté

  /deployments/{id}/restart:
    parameters:
      - $ref: "#/components/parameters/ID"
    post:
      tags: [deployments]
      summary: Redémarrer un déploiement
      responses:
        "200":
          description: Déploiement redémarré

  /servers:
    get:
      tags: [servers]
      summary: Lister tous les serveurs
      responses:
        "200":
          description: Liste de serveurs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Server"
    post:
      tags: [servers]
      summary: Créer un serveur
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateServerRequest"
      responses:
        "201":
          description: Serveur créé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Server"
        "400":
          $ref: "#/components/responses/BadRequest"

  /servers/{id}:
    parameters:
      - $ref: "#/components/parameters/ID"
    get:
      tags: [servers]
      summary: Obtenir un serveur par ID
      responses:
        "200":
          description: Serveur trouvé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Server"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [servers]
      summary: Mettre à jour un serveur
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateServerRequest"
      responses:
        "200":
          description: Serveur mis à jour
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Server"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [servers]
      summary: Supprimer un serveur
      responses:
        "204":
          description: Serveur supprimé
        "404":
          $ref: "#/components/responses/NotFound"

  /servers/{id}/ping:
    parameters:
      - $ref: "#/components/parameters/ID"
    post:
      tags: [servers]
      summary: Tester la connexion Docker d'un serveur
      responses:
        "200":
          description: Connexion réussie
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
        "404":
          $ref: "#/components/responses/NotFound"
        "502":
          description: Impossible de joindre le Docker Engine
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /docker/images:
    get:
      tags: [docker]
      summary: Lister les images Docker
      parameters:
        - name: server_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: ID du serveur cible (local si absent)
      responses:
        "200":
          description: Liste d'images
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object

  /docker/images/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: ID ou nom de l'image Docker
    get:
      tags: [docker]
      summary: Obtenir une image Docker par ID
      parameters:
        - name: server_id
          in: query
          required: false
          schema:
            type: string
          description: ID du serveur cible (local si absent)
      responses:
        "200":
          description: Image trouvée
          content:
            application/json:
              schema:
                type: object
        "404":
          $ref: "#/components/responses/NotFound"

components:
  parameters:
    ID:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    NotFound:
      description: Ressource introuvable
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    BadRequest:
      description: Requête invalide
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string

    Project:
      type: object
      properties:
        id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        name:
          type: string
        description:
          type: string
        services:
          type: array
          items:
            $ref: "#/components/schemas/Service"
        volumes:
          type: array
          items:
            $ref: "#/components/schemas/Volume"

    CreateProjectRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string

    UpdateProjectRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string

    Service:
      type: object
      properties:
        id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        project_id:
          type: string
        name:
          type: string
        image:
          type: string
        ports:
          type: array
          items:
            $ref: "#/components/schemas/PortMapping"
        env_vars:
          type: array
          items:
            $ref: "#/components/schemas/EnvVar"
        volume_mounts:
          type: array
          items:
            $ref: "#/components/schemas/VolumeMount"
        depends_on:
          type: array
          items:
            type: string

    CreateServiceRequest:
      type: object
      required: [name, image]
      properties:
        name:
          type: string
        image:
          type: string
        ports:
          type: array
          items:
            $ref: "#/components/schemas/PortMapping"
        env_vars:
          type: array
          items:
            $ref: "#/components/schemas/EnvVar"
        volume_mounts:
          type: array
          items:
            $ref: "#/components/schemas/VolumeMount"
        depends_on:
          type: array
          items:
            type: string

    UpdateServiceRequest:
      type: object
      properties:
        name:
          type: string
        image:
          type: string
        ports:
          type: array
          items:
            $ref: "#/components/schemas/PortMapping"
        env_vars:
          type: array
          items:
            $ref: "#/components/schemas/EnvVar"
        volume_mounts:
          type: array
          items:
            $ref: "#/components/schemas/VolumeMount"
        depends_on:
          type: array
          items:
            type: string

    PortMapping:
      type: object
      properties:
        host:
          type: string
        container:
          type: string
        protocol:
          type: string
          enum: [tcp, udp]

    EnvVar:
      type: object
      properties:
        id:
          type: string
          format: uuid
        service_id:
          type: string
        key:
          type: string
        value:
          type: string
        is_variable:
          type: boolean

    VolumeMount:
      type: object
      properties:
        source:
          type: string
        target:
          type: string

    Volume:
      type: object
      properties:
        id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        project_id:
          type: string
        name:
          type: string
        driver:
          type: string
          default: local

    CreateVolumeRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        driver:
          type: string
          default: local

    Deployment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        started_at:
          type: string
          format: date-time
          nullable: true
        project_id:
          type: string
        server_id:
          type: string
          nullable: true
        server:
          $ref: "#/components/schemas/Server"
          nullable: true
        name:
          type: string
        status:
          type: string
        env_override:
          type: array
          items:
            $ref: "#/components/schemas/DeploymentEnvOverride"
        containers:
          type: array
          items:
            $ref: "#/components/schemas/Container"

    Container:
      type: object
      properties:
        id:
          type: string
          format: uuid
        deployment_id:
          type: string
          format: uuid
        service_id:
          type: string
          format: uuid
        docker_id:
          type: string
          description: ID du conteneur retourné par le Docker Engine
        name:
          type: string
        replica_index:
          type: integer
          minimum: 1
          description: Numéro de replica (commence à 1)
        status:
          type: string
          description: État calculé dynamiquement via le Docker Engine (running, exited, unknown…)
        ports:
          type: array
          items:
            $ref: "#/components/schemas/PortMapping"

    CreateDeploymentRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        server_id:
          type: string
          format: uuid
          nullable: true
          description: ID du serveur cible (local si absent)
        env_override:
          type: array
          items:
            $ref: "#/components/schemas/DeploymentEnvOverride"
        scale:
          type: object
          additionalProperties:
            type: integer
            minimum: 1
          description: |
            Nombre de replicas par service (clé = nom du service, valeur = nombre d'instances).
            Si absent ou non spécifié pour un service, 1 replica est créé.
            Les ports hôte sont décalés automatiquement pour chaque replica supplémentaire.
          example:
            api: 3
            worker: 2

    DeploymentEnvOverride:
      type: object
      properties:
        id:
          type: string
          format: uuid
        deployment_id:
          type: string
        key:
          type: string
        value:
          type: string

    Server:
      type: object
      properties:
        id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        name:
          type: string
        host:
          type: string
        user:
          type: string
        port:
          type: integer
          default: 22
        is_local:
          type: boolean

    CreateServerRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        host:
          type: string
          description: Adresse de l'hôte distant (ignoré si is_local=true)
        user:
          type: string
          description: Utilisateur SSH (ignoré si is_local=true)
        port:
          type: integer
          default: 22
        private_key:
          type: string
          description: Clé privée SSH au format PEM (jamais retournée par l'API)
        is_local:
          type: boolean
          default: false

    UpdateServerRequest:
      type: object
      properties:
        name:
          type: string
        host:
          type: string
        user:
          type: string
        port:
          type: integer
        private_key:
          type: string
          description: Clé privée SSH au format PEM (jamais retournée par l'API)
        is_local:
          type: boolean
